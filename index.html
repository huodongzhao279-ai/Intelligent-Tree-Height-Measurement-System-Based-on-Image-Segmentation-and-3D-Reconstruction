<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级倒计时</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --box-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
            padding: 40px;
            background-color: var(--box-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 900px;
            width: 90%;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: var(--text-color);
            letter-spacing: 2px;
        }

        .countdown {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 40px;
        }

        .time-box {
            background-color: rgba(0, 0, 0, 0.2);
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 20px;
            min-width: 80px;
            transition: transform 0.3s ease;
        }

        .time-box:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .time-box span {
            display: block;
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .label {
            font-size: 1rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #334155;
        }

        .controls label {
            font-size: 1.1rem;
            margin-right: 10px;
        }

        input[type="datetime-local"] {
            padding: 10px 15px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            background-color: #334155;
            color: white;
            outline: none;
            cursor: pointer;
        }

        input[type="datetime-local"]:focus {
            border: 1px solid var(--accent-color);
        }

        .message {
            display: none;
            font-size: 2rem;
            color: #4ade80;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>⏳ 距离目标时间还有</h1>
        
        <div class="countdown" id="countdown-container">
            <div class="time-box"><span id="years">0</span><div class="label">年</div></div>
            <div class="time-box"><span id="months">0</span><div class="label">月</div></div>
            <div class="time-box"><span id="days">0</span><div class="label">天</div></div>
            <div class="time-box"><span id="hours">0</span><div class="label">时</div></div>
            <div class="time-box"><span id="minutes">0</span><div class="label">分</div></div>
            <div class="time-box"><span id="seconds">0</span><div class="label">秒</div></div>
        </div>

        <div class="message" id="success-message">🎉 目标时间已到达！</div>

        <div class="controls">
            <label for="targetDate">设置目标时间：</label>
            <input type="datetime-local" id="targetDate">
        </div>
    </div>

    <script>
        let countdownInterval;

        function updateCountdown() {
            const now = new Date();
            const targetInput = document.getElementById('targetDate').value;
            
            if (!targetInput) return;

            const target = new Date(targetInput);
            const diff = target - now;

            // 如果时间已经到达或过期
            if (diff <= 0) {
                document.getElementById('years').innerText = '0';
                document.getElementById('months').innerText = '0';
                document.getElementById('days').innerText = '0';
                document.getElementById('hours').innerText = '0';
                document.getElementById('minutes').innerText = '0';
                document.getElementById('seconds').innerText = '0';
                
                document.getElementById('countdown-container').style.display = 'none';
                document.getElementById('success-message').style.display = 'block';
                return;
            } else {
                document.getElementById('countdown-container').style.display = 'flex';
                document.getElementById('success-message').style.display = 'none';
            }

            // 精确的日历相减逻辑
            let years = target.getFullYear() - now.getFullYear();
            let months = target.getMonth() - now.getMonth();
            let days = target.getDate() - now.getDate();
            let hours = target.getHours() - now.getHours();
            let minutes = target.getMinutes() - now.getMinutes();
            let seconds = target.getSeconds() - now.getSeconds();

            // 借位处理（从秒到年递推计算）
            if (seconds < 0) {
                seconds += 60;
                minutes--;
            }
            if (minutes < 0) {
                minutes += 60;
                hours--;
            }
            if (hours < 0) {
                hours += 24;
                days--;
            }
            if (days < 0) {
                // 获取上个月的总天数用来借位
                const prevMonth = new Date(target.getFullYear(), target.getMonth(), 0);
                days += prevMonth.getDate();
                months--;
            }
            if (months < 0) {
                months += 12;
                years--;
            }

            // 更新页面显示
            document.getElementById('years').innerText = years;
            document.getElementById('months').innerText = months;
            document.getElementById('days').innerText = days;
            document.getElementById('hours').innerText = hours < 10 ? '0' + hours : hours;
            document.getElementById('minutes').innerText = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('seconds').innerText = seconds < 10 ? '0' + seconds : seconds;
        }

        // 初始化：设置默认目标时间为明年的1月1日
        function init() {
            const nextYear = new Date().getFullYear() + 1;
            const defaultDate = `${nextYear}-01-01T00:00`;
            document.getElementById('targetDate').value = defaultDate;
            
            // 监听用户更改时间
            document.getElementById('targetDate').addEventListener('change', updateCountdown);
            
            // 启动定时器，每秒刷新一次
            updateCountdown();
            countdownInterval = setInterval(updateCountdown, 1000);
        }

        // 运行初始化
        init();
    </script>
</body>
</html>
